name: Deploy to Firebase Hosting

on:
    push:
        branches:
            - main

permissions:
    contents: read
    id-token: write

jobs:
    build_and_deploy:
        runs-on: ubuntu-latest
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        steps:
            -   name: Checkout Code
                uses: actions/checkout@v6

            -   id: 'auth'
                name: 'Authenticate to Google Cloud'
                uses: 'google-github-actions/auth@v3'
                with:
                    workload_identity_provider: 'projects/575953891979/locations/global/workloadIdentityPools/gh-pool-v2/providers/gh-provider-v2'
                    service_account: 'firebase-adminsdk-fbsvc@edugraph-438718.iam.gserviceaccount.com'

            -   name: Setup Node.js
                uses: actions/setup-node@v5
                with:
                    node-version: '22'

            -   name: Install Dependencies
                run: npm install

            -   name: Build Vite App
                run: npm run build

            -   name: Deploy to Firebase Hosting
                uses: FirebaseExtended/action-hosting-deploy@v0
                with:
                    target: 'edugraph-editor'
                    repoToken: '${{ secrets.GITHUB_TOKEN }}'
                    projectId: 'edugraph-438718'
                    channelId: live
                    entryPoint: .
