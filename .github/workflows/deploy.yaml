name: Deploy to Firebase Hosting

on:
    push:
        branches:
            - main

permissions:
    contents: read
    id-token: write

jobs:
    build_and_deploy:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout Code
                uses: actions/checkout@v6

            -   id: 'auth'
                name: 'Authenticate to Google Cloud'
                uses: 'google-github-actions/auth@v3'
                with:
                    # Make sure your pool/provider versions match what you have working
                    workload_identity_provider: 'projects/575953891979/locations/global/workloadIdentityPools/gh-pool-v2/providers/gh-provider-v2'
                    service_account: 'firebase-adminsdk-fbsvc@edugraph-438718.iam.gserviceaccount.com'
                    token_format: 'access_token' # <--- THE MAGIC KEY

            -   name: Setup Node.js
                uses: actions/setup-node@v5
                with:
                    node-version: '22'

            -   name: Install Dependencies
                run: npm install

            -   name: Build Vite App
                run: npm run build

            -   name: Install Firebase CLI
                run: npm install -g firebase-tools

            -   name: Deploy to Firebase Hosting
                run: firebase deploy --only hosting:edugraph-editor --project edugraph-438718 --non-interactive
                env:
                    # Feed the raw short-lived token directly to Firebase
                    FIREBASE_TOKEN: ${{ steps.auth.outputs.access_token }}
